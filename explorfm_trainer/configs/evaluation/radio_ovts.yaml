# @package _global_

defaults:
  - override /data: rugd # choose datamodule with `test_dataloader()` for evaluation
  - override /model: binary_seg
  - override /logger: wandb
  - override /trainer: gpu

tags: ["siglip2", "eval", "RADIO", "c-radio_v3-b"]

# passing checkpoint path is necessary for evaluation
ckpt_path: null

model:
  net:
    _target_: src.models.components.radio_ovts.RADIO_Segmentation
    model_version: "c-radio_v3-b"
    adaptor_version: "siglip2"
    pixel_level_seg: true
  pred_threshold: 0.09
  vmax: 0.2

logger:
  wandb:
    tags: ${tags}
    project: "TraversabilitySegmentation"
    entity: "objsearch-jpl"
    name: eval_rugd_radio_ovts_siglip2

paths:
  root_dir: /cluster/home/$USER/scratch/explorfm_trainer
  data_dir: /cluster/home/$USER/scratch/data


data:
  batch_size: 4
  num_workers: 4
  pin_memory: True